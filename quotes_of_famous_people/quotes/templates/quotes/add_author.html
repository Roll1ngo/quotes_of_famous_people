{% extends "quotes/base.html" %}
{% block content %}
<body>
<form method="POST" action="{% url 'quotes:add_author' %}">
    {% csrf_token %}
    <h1 class="author-class">Add Author</h1>
    <div style="padding: 10px ">
        <label class="">Enter the fullname:
            {{form_author.fullname}}
        </label>
        <span>{{ form_author.errors.fullname }}</span>
    </div>


    <div style="padding: 10px">
        <label class="authorheader">Enter the born date:</label>
        {{ form_author.born_date }}

        <span>{{ form_author.errors.born_date }}</span>
    </div>

    <div style="padding: 10px">
        <label>Enter the born location:
            {{form_author.born_location}}
        </label>
        <span>{{ form_author.errors.born_location }}</span>
    </div>
    <div style="padding: 10px">
        <label>Enter the description:
            {{form_author.description}}
        </label>
        <span>{{ form_author.errors.description }}</span>
    </div>

    <div class="grid">
        <button type="submit">Submit</button>


        <button type="reset" class="secondary">Reset</button>
    </div>
</form>

</
</body>
</html>
{% endblock %}
